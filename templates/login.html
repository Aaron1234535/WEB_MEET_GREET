{% extends "auth_base.html" %}
{% block content %}

<h2 class="page-title">Login</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn-primary">Login</button>
</form>

<p class="login-hint">
    Don't have an account?
    <a href="{% url 'signup' %}">Signup</a>
</p>

{% endblock %}
